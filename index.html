<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>준영이의 사과</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FFC0CB; /* 핑크색 배경 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 10;
        }

        h1 {
            color: #D81B60;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            position: relative;
            height: 50px;
        }

        button {
            padding: 10px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #btn-yes {
            background-color: #D81B60;
            color: white;
        }

        #btn-no {
            background-color: #757575;
            color: white;
            position: absolute;
            left: 50%;
            margin-left: 10px; /* '예' 버튼 옆에 배치 */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>준영이의 사과를<br>받아주시겠습니까?</h1>
        <div class="btn-group">
            <button id="btn-yes" onclick="accepted()">예</button>
            <button id="btn-no">아니오</button>
        </div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');

        function moveButton() {
            // 화면 너비와 높이 내에서 무작위 위치 계산
            // 버튼이 화면 밖으로 나가지 않도록 여백(padding) 고려
            const padding = 100;
            const x = Math.random() * (window.innerWidth - padding * 2) + padding;
            const y = Math.random() * (window.innerHeight - padding * 2) + padding;

            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
            btnNo.style.marginLeft = '0';
        }

        // 데스크톱: 마우스가 접근할 때
        btnNo.addEventListener('mouseover', moveButton);

        // 모바일: 터치가 시작될 때
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault(); // 클릭 방지
            moveButton();
        });

        function accepted() {
            alert("받아주셔서 감사합니다.");
            // 이후 추가적인 메시지나 효과를 넣으려면 이 부분에 작성하세요.
        }
    </script>
</body>
</html>
