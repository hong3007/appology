<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>준영이의 진심</title>
    <style>
        :root {
            --bg-pink: #FFC0CB;
            --main-pink: #D81B60;
            --text-gray: #424242;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-pink);
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            width: 90%; max-width: 400px;
            position: absolute;
            transition: opacity 0.3s ease;
        }

        #auth-screen { display: block; z-index: 30; opacity: 1; }
        #main-screen { display: none; z-index: 20; opacity: 0; }
        #final-screen { display: none; z-index: 10; opacity: 0; }

        h1, h2 { color: var(--main-pink); line-height: 1.5; }
        h1 { font-size: 1.6rem; margin-bottom: 2rem; }
        h2 { font-size: 1.2rem; margin-bottom: 1.5rem; }

        .date-selectors { display: flex; flex-direction: column; gap: 15px; margin-bottom: 2rem; }
        .select-group { display: flex; justify-content: center; gap: 5px; }
        select {
            padding: 10px; border: 2px solid #ddd; border-radius: 10px;
            font-size: 1rem; color: var(--text-gray); background: white;
            touch-action: auto; /* 드롭박스는 터치 가능하게 */
        }
        button#btn-auth {
            padding: 12px 30px; font-size: 1.1rem; border: none; border-radius: 10px;
            background-color: var(--main-pink); color: white; cursor: pointer;
        }

        #drag-target-container { width: 80px; height: 80px; margin: 2rem auto; position: relative; }
        #drag-target {
            width: 80px; height: 80px; background-color: #fce4ec;
            border: 3px dashed var(--main-pink); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: grab; font-weight: bold; color: var(--main-pink);
            position: absolute; top: 0; left: 0; z-index: 50;
        }

        .drop-zones { display: flex; justify-content: space-around; width: 100%; margin-top: 2rem; }
        .drop-zone {
            width: 100px; height: 100px; border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; font-weight: bold; color: white;
        }
        #zone-yes { background-color: #81C784; border: 3px solid #66BB6A; }
        #zone-no { background-color: #E57373; border: 3px solid #EF5350; }

        /* 고양이 애니메이션 - 더 킹받게 수정 */
        #cat-image {
            width: 250px; height: auto;
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 1000; opacity: 0; pointer-events: none;
            display: none;
        }

        .cat-annoying {
            display: block !important;
            animation: annoyingPop 2.2s cubic-bezier(0.36, 0, 0.66, -0.56) forwards;
        }

        @keyframes annoyingPop {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.5) rotate(-15deg); opacity: 1; }
            25% { transform: translate(-50%, -50%) scale(1.2) rotate(15deg); }
            35% { transform: translate(-50%, -50%) scale(1.8) rotate(-20deg); }
            45% { transform: translate(-50%, -50%) scale(1.4) rotate(20deg); }
            55% { transform: translate(-50%, -50%) scale(2.2) rotate(-25deg); }
            65% { transform: translate(-50%, -50%) scale(1.8) rotate(25deg); }
            85% { transform: translate(-50%, -50%) scale(2.5) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(4.0); opacity: 0; }
        }
    </style>
</head>
<body>

    <img id="cat-image" src="cat.png" alt="고양이">

    <div id="auth-screen" class="container">
        <h2>우리의 소중한 날짜들</h2>
        <div class="date-selectors">
            <p>에옹이의 생년월일</p>
            <div class="select-group">
                <select id="birth-year"></select><select id="birth-month"></select><select id="birth-day"></select>
            </div>
            <p>우리가 만난 날</p>
            <div class="select-group">
                <select id="anni-year"></select><select id="anni-month"></select><select id="anni-day"></select>
            </div>
        </div>
        <button id="btn-auth" onclick="checkDates()">확인</button>
    </div>

    <div id="main-screen" class="container">
        <h1>준영이의 사과를<br>받아주시겠습니까?</h1>
        <div id="drag-target-container"><div id="drag-target">준영</div></div>
        <div class="drop-zones">
            <div id="zone-yes" class="drop-zone">예</div>
            <div id="zone-no" class="drop-zone">아니오</div>
        </div>
    </div>

    <div id="final-screen" class="container">
        <h1>💖 사과 수락 완료 💖</h1>
        <p><strong>에옹아</strong> 사과 받아줘서 정말 고마워<br>생일이랑 기념일 절대로 안 잊을게!</p>
    </div>

    <script>
        function fill(id, s, e) {
            const el = document.getElementById(id);
            for(let i=s; i<=e; i++) el.options.add(new Option(i+(id.includes('year')?'년':(id.includes('month')?'월':'일')), i));
        }
        fill('birth-year', 1990, 2010); fill('birth-month', 1, 12); fill('birth-day', 1, 31);
        fill('anni-year', 2015, 2026); fill('anni-month', 1, 12); fill('anni-day', 1, 31);

        function checkDates() {
            if(document.getElementById('birth-year').value == '1998' && 
               document.getElementById('birth-month').value == '1' && 
               document.getElementById('birth-day').value == '22' &&
               document.getElementById('anni-year').value == '2024' && 
               document.getElementById('anni-month').value == '11' && 
               document.getElementById('anni-day').value == '3') {
                
                document.getElementById('auth-screen').style.display = 'none';
                const main = document.getElementById('main-screen');
                main.style.display = 'block';
                setTimeout(() => main.style.opacity = '1', 50);
            } else {
                alert("틀렸습니다!! 정답은 (98년 1월 22일) (24년 11월 3일)");
            }
        }

        const drag = document.getElementById('drag-target');
        const yes = document.getElementById('zone-yes');
        const no = document.getElementById('zone-no');
        let isDraging = false;
        let ox, oy;

        function moveNo() {
            no.style.position = 'fixed';
            no.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            no.style.top = Math.random() * (window.innerHeight - 100) + 'px';
        }

        function start(e) {
            if (e.target !== drag) return; // 준영 버튼을 누를 때만 드래그 시작
            isDraging = true;
            const touch = e.touches ? e.touches[0] : e;
            ox = touch.clientX - drag.offsetLeft;
            oy = touch.clientY - drag.offsetTop;
        }

        function move(e) {
            if(!isDraging) return;
            e.preventDefault();
            const touch = e.touches ? e.touches[0] : e;
            drag.style.left = (touch.clientX - ox) + 'px';
            drag.style.top = (touch.clientY - oy) + 'px';

            const dr = drag.getBoundingClientRect();
            const nr = no.getBoundingClientRect();
            if(!(dr.right < nr.left || dr.left > nr.right || dr.bottom < nr.top || dr.top > nr.bottom)) moveNo();
        }

        function end() {
            if(!isDraging) return; // 핵심 수정: 드래그 중이 아니면 아무것도 안 함 (가드 클로즈)
            isDraging = false;

            const dr = drag.getBoundingClientRect();
            const yr = yes.getBoundingClientRect();
            
            // '예' 영역과 겹치는지 확인
            if(!(dr.right < yr.left || dr.left > yr.right || dr.bottom < yr.top || dr.top > yr.bottom)) {
                document.getElementById('main-screen').style.display = 'none';
                const final = document.getElementById('final-screen');
                final.style.display = 'block';
                setTimeout(() => final.style.opacity = '1', 50);
                
                const cat = document.getElementById('cat-image');
                cat.classList.add('cat-annoying'); // 드롭 성공 시에만 고양이 등장
            } else {
                drag.style.left = '0px'; drag.style.top = '0px';
            }
        }

        drag.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);
        drag.addEventListener('touchstart', start);
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('touchend', end);
        no.addEventListener('click', () => { alert("꼼수 쓰지 마세요 !!!"); moveNo(); });
    </script>
</body>
</html>
